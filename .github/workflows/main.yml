name: Despliegue Automatico a GitHub Pageson:  push:    branches: ["main"]permissions:  contents: read  pages: write  id-token: writeconcurrency:  group: "pages"  cancel-in-progress: falsejobs:  deploy:    environment:      name: github-pages      url: ${{ steps.deployment.outputs.page_url }}    runs-on: ubuntu-latest    steps:      - name: Checkout del codigo        uses: actions/checkout@v4      - name: Configurar GitHub Pages        uses: actions/configure-pages@v4      - name: Subir artefactos del sitio        uses: actions/upload-pages-artifact@v3        with:          path: '.'      - name: Desplegar en GitHub Pages        id: deployment        uses: actions/deploy-pages@v4
